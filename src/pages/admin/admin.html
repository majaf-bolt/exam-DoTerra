<section>
  <h1 class="h2 mb-4">Админ панел</h1>

  <ul class="nav nav-tabs mb-4" id="admin-tabs" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active" id="products-tab-btn" data-bs-toggle="tab" data-bs-target="#products-tab" type="button" role="tab">
        Продукти
      </button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="orders-tab-btn" data-bs-toggle="tab" data-bs-target="#orders-tab" type="button" role="tab">
        Поръчки
      </button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="customers-tab-btn" data-bs-toggle="tab" data-bs-target="#customers-tab" type="button" role="tab">
        Клиенти
      </button>
    </li>
  </ul>

  <div class="tab-content" id="admin-tab-content">
    <div class="tab-pane fade show active" id="products-tab" role="tabpanel">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h5 mb-0">Управление на продукти</h2>
        <button type="button" class="btn btn-success" id="add-product-btn">Добави</button>
      </div>
      <div id="products-table-wrap"></div>
    </div>

    <div class="tab-pane fade" id="orders-tab" role="tabpanel">
      <h2 class="h5 mb-3">Управление на поръчки</h2>
      <div id="orders-table-wrap"></div>
    </div>

    <div class="tab-pane fade" id="customers-tab" role="tabpanel">
      <h2 class="h5 mb-3">Клиенти</h2>
      <div id="customers-table-wrap"></div>
    </div>
  </div>
</section>

<div class="modal fade" id="product-modal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="product-modal-title">Продукт</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form id="product-form">
        <div class="modal-body">
          <input type="hidden" id="product-id" />
          <div class="row g-3">
            <div class="col-md-6">
              <label for="product-name" class="form-label">Име</label>
              <input type="text" class="form-control" id="product-name" required />
            </div>
            <div class="col-md-6">
              <label for="product-category" class="form-label">Категория</label>
              <select class="form-select" id="product-category" required>
                <option value="oils">Масла</option>
                <option value="blends">Смеси</option>
                <option value="creams">Кремове</option>
                <option value="other">Други</option>
              </select>
            </div>
            <div class="col-md-4">
              <label for="product-price" class="form-label">Цена</label>
              <input type="number" class="form-control" id="product-price" min="0" step="0.01" required />
            </div>
            <div class="col-md-4">
              <label for="product-stock" class="form-label">Наличност</label>
              <input type="number" class="form-control" id="product-stock" min="0" required />
            </div>
            <div class="col-md-4">
              <label for="product-image-url" class="form-label">URL на снимка</label>
              <input type="url" class="form-control" id="product-image-url" />
            </div>
            <div class="col-12">
              <label for="product-description" class="form-label">Описание</label>
              <textarea class="form-control" id="product-description" rows="3"></textarea>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отказ</button>
          <button type="submit" class="btn btn-success">Запази</button>
        </div>
      </form>
    </div>
  </div>
</div>
