<section class="auth-page">
  <div class="auth-card card shadow-sm">
    <div class="card-body p-4">
      <h1 class="h4 text-center mb-4 text-success">doTERRA Shop</h1>

      <ul class="nav nav-tabs nav-fill mb-4" id="auth-tabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button
            class="nav-link active"
            id="login-tab-btn"
            data-bs-toggle="tab"
            data-bs-target="#login-tab"
            type="button"
            role="tab"
            aria-controls="login-tab"
            aria-selected="true"
          >
            Вход
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button
            class="nav-link"
            id="register-tab-btn"
            data-bs-toggle="tab"
            data-bs-target="#register-tab"
            type="button"
            role="tab"
            aria-controls="register-tab"
            aria-selected="false"
          >
            Регистрация
          </button>
        </li>
      </ul>

      <div class="tab-content">
        <div class="tab-pane fade show active" id="login-tab" role="tabpanel" aria-labelledby="login-tab-btn">
          <form id="login-form" novalidate>
            <div class="mb-3">
              <label for="login-email" class="form-label">Имейл</label>
              <input type="email" class="form-control" id="login-email" required autocomplete="email" />
            </div>
            <div class="mb-4">
              <label for="login-password" class="form-label">Парола</label>
              <input
                type="password"
                class="form-control"
                id="login-password"
                required
                autocomplete="current-password"
              />
            </div>
            <button type="submit" class="btn btn-success w-100">Вход</button>
          </form>
        </div>

        <div class="tab-pane fade" id="register-tab" role="tabpanel" aria-labelledby="register-tab-btn">
          <form id="register-form" novalidate>
            <div class="mb-3">
              <label for="register-full-name" class="form-label">Пълно име</label>
              <input type="text" class="form-control" id="register-full-name" required autocomplete="name" />
            </div>
            <div class="mb-3">
              <label for="register-email" class="form-label">Имейл</label>
              <input type="email" class="form-control" id="register-email" required autocomplete="email" />
            </div>
            <div class="mb-3">
              <label for="register-password" class="form-label">Парола</label>
              <input
                type="password"
                class="form-control"
                id="register-password"
                required
                minlength="6"
                autocomplete="new-password"
              />
            </div>
            <div class="mb-4">
              <label for="register-password-confirm" class="form-label">Потвърди парола</label>
              <input
                type="password"
                class="form-control"
                id="register-password-confirm"
                required
                minlength="6"
                autocomplete="new-password"
              />
            </div>
            <button type="submit" class="btn btn-success w-100">Регистрация</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
